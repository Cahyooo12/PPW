<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran UKM - Universitas Amikom Yogyakarta</title>
    <style>
        .form-container {
            border: 1px solid #000;
            padding: 20px;
            max-width: 500px;
            margin: 20px auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-control, .radio-group, .checkbox-group, .range-container, .file-input-wrapper {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 5px;
            display: block;
            width: 100%;
            box-sizing: border-box;
        }
        label {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <div class="header">
            <h1>Formulir Pendaftaran</h1>
            <p>Anggota UKM Universitas Amikom Yogyakarta</p>
        </div>

        <form action="#" method="POST">
            <div class="form-group">
                <label class="form-label" for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" class="form-control" placeholder="Masukkan nama anda..."
                    required>
            </div>

            <div class="form-group">
                <label class="form-label" for="nim">NIM</label>
                <input type="text" id="nim" name="nim" class="form-control" placeholder="Masukkan NIM anda..." required>
            </div>

            <div class="form-group">
                <label class="form-label" for="prodi">Program Studi</label>
                <select id="prodi" name="prodi" class="form-control" required>
                    <option value="" disabled selected>- Pilih Program Studi -</option>
                    <option value="si">Sistem Informasi</option>
                    <option value="if">Informatika</option>
                    <option value="tk">Teknik Komputer</option>
                    <option value="ti">Teknologi Informasi</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Jenis Kelamin</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="jenis_kelamin" value="laki-laki" required>
                        Laki - Laki
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="jenis_kelamin" value="perempuan" required>
                        Perempuan
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="bahasa_inggris">Kemampuan Bahasa Inggris (1 - 10)</label>
                <div class="range-container">
                    <input type="range" id="bahasa_inggris" name="bahasa_inggris" min="1" max="10" value="5">
                    <div class="range-value" id="range-val">5</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">UKM yang Diminati</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="ukm" value="koma">
                        KOMA
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="ukm" value="amo">
                        AMO
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="ukm" value="mayapala">
                        MAYAPALA
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Foto Close Up</label>
                <div class="file-input-wrapper">
                    <input type="file" id="foto" name="foto" accept="image/*" required>
                    <div class="file-input-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                        <span id="file-name">Pilih file foto atau tarik ke sini</span>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button type="reset" class="btn btn-reset" id="btn-reset">Reset</button>
                <button type="submit" class="btn btn-submit">Submit Form</button>
            </div>
        </form>
    </div>

</body>

</html>
